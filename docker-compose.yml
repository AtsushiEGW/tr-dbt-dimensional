services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    # VS Code Dev Containers から attach するメインサービス
    volumes:
      - ./:/workspace/project:cached
      - ./.env:/workspace/project/.env:ro
    env_file:
      - ./.env
    working_dir: /workspace/project
    depends_on:
      - db
    networks:
      - metanet1
    ports:
      - "6080:6080"   # noVNC
    environment:
      - DISPLAY=:99
    shm_size: "2gb"   # ヘッドフル時の安定化

  db:
    image: postgres:latest
    # container_name: postgres  # 衝突しやすいので省略推奨
    restart: always
    env_file:
      - ./.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "55432:5432"  # ホスト既存の 5432 と競合を避ける
    networks:
      - metanet1

  metabase:
    image: metabase/metabase:latest
    # container_name: metabase
    hostname: metabase
    restart: always
    depends_on:
      - db
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${POSTGRES_DB}
      - MB_DB_HOST=db
      - MB_DB_PORT=${POSTGRES_PORT}
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
    # healthcheck は curl 未導入のため一旦なし。必要なら busybox/curl を別途導入して再有効化。
    networks:
      - metanet1
    ports:
      - "3000:3000"

networks:
  metanet1:
    driver: bridge

volumes:
  pgdata: